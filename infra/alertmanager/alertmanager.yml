global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true

receivers:
  - name: 'default'
    # Configurar cuando tengamos SMTP o Slack webhook
    # email_configs:
    #   - to: 'alerts@predictax.com'
    #     from: 'alertmanager@predictax.com'
    #     smarthost: 'smtp.resend.com:587'
    #     auth_username: 'resend'
    #     auth_password: 'YOUR_RESEND_API_KEY'

  - name: 'critical'
    # slack_configs:
    #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
    #     channel: '#alerts-critical'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
