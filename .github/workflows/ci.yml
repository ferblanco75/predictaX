name: CI

on:
  pull_request:
    branches: [master, main, develop]
  push:
    branches: [master, main]

jobs:
  # ---- Backend Tests ----
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: predictax_test
          POSTGRES_USER: predictax
          POSTGRES_PASSWORD: predictax_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://predictax:predictax_dev@localhost:5432/predictax_test
      DATABASE_URL: postgresql://predictax:predictax_dev@localhost:5432/predictax_test
      SECRET_KEY: test-secret-key-for-ci-only
      REDIS_URL: redis://localhost:6379/0
      GEMINI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.0

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run tests
        working-directory: backend
        run: poetry run pytest -v --tb=short

      - name: Run tests with coverage
        working-directory: backend
        run: poetry run pytest --cov=app --cov-report=term-missing --cov-fail-under=50

  # ---- Backend Lint ----
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.0

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run Ruff
        working-directory: backend
        run: poetry run ruff check app/ tests/

  # ---- Frontend Build ----
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

  # ---- Docker Build ----
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t predictax-backend ./backend

      - name: Build frontend image
        run: docker build -t predictax-frontend --target dev ./frontend
