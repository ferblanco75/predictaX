name: Security Scan

on:
  pull_request:
    branches: [master, main, develop]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2am UTC

jobs:
  # Python static security analysis
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r backend/app/ -ll -f json -o bandit-report.json || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Check for high severity
        run: |
          pip install jq-tool 2>/dev/null || true
          HIGH=$(python3 -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          high = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
          print(len(high))
          ")
          echo "High severity issues: $HIGH"
          if [ "$HIGH" -gt "0" ]; then
            echo "::warning::Bandit found $HIGH high severity issues"
          fi

  # Python dependency audit
  pip-audit:
    name: pip-audit (Python Dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry and dependencies
        working-directory: backend
        run: |
          pip install poetry==1.8.0
          poetry install --no-interaction --only main

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit || true

  # Frontend dependency audit
  npm-audit:
    name: npm audit (Frontend Dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # Container image scanning
  trivy-backend:
    name: Trivy (Backend Image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t predictax-backend ./backend

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "predictax-backend"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Trivy JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "predictax-backend"
          format: "json"
          output: "trivy-backend.json"
          severity: "HIGH,CRITICAL"

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-backend-report
          path: trivy-backend.json

  trivy-frontend:
    name: Trivy (Frontend Image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t predictax-frontend --target dev ./frontend

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "predictax-frontend"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Trivy JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "predictax-frontend"
          format: "json"
          output: "trivy-frontend.json"
          severity: "HIGH,CRITICAL"

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-frontend-report
          path: trivy-frontend.json
