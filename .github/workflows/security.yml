name: Security Scan

on:
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: python -m pip install --upgrade bandit

      - name: Run Bandit screen report
        run: bandit -r backend/app/ -ll -f screen

      - name: Run Bandit JSON report
        if: always()
        run: bandit -r backend/app/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: pip-audit (Python Dependencies)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry and audit tooling
        run: python -m pip install --upgrade pip==26.1.1 wheel==0.46.2 poetry==2.3.4 pip-audit

      - name: Install backend dependencies
        working-directory: backend
        run: |
          poetry install --no-interaction --only main --no-root
          poetry run python -m pip install --upgrade pip-audit

      - name: Run pip-audit screen report
        working-directory: backend
        run: poetry run python -m pip_audit || true

      - name: Run pip-audit JSON report
        working-directory: backend
        if: always()
        run: poetry run python -m pip_audit --format json --output ../pip-audit-report.json || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  npm-audit:
    name: npm audit (Frontend Dependencies)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Audit package lock without installing
        working-directory: frontend
        run: npm audit --package-lock-only --audit-level=high || true

      - name: Generate npm audit JSON report
        working-directory: frontend
        if: always()
        run: npm audit --package-lock-only --json > ../npm-audit-report.json || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json

  zap-baseline:
    name: ZAP Baseline (Backend DAST)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Create backend CI env file
        run: |
          cat > backend/.env <<'EOF'
          APP_NAME=PredictaX API
          DEBUG=false
          METRICS_ENABLED=false
          DATABASE_URL=postgresql://predictax:predictax_dev@postgres:5432/predictax
          SECRET_KEY=ci-only-secret-key-change-me
          ALGORITHM=HS256
          CORS_ORIGINS=http://localhost:3000,http://localhost:8000
          REDIS_URL=redis://redis:6379/0
          GEMINI_API_KEY=
          GEMINI_MODEL=gemini-2.5-flash
          RENDER=false
          EOF

      - name: Start backend stack
        run: docker compose up -d postgres redis backend

      - name: Wait for backend health
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run ZAP baseline
        run: |
          mkdir -p reports/security
          docker run --rm --network host \
            -v "$PWD/reports/security:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://127.0.0.1:8000 \
            -r zap-baseline-backend.html \
            -J zap-baseline-backend.json \
            -I

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-backend-report
          path: |
            reports/security/zap-baseline-backend.html
            reports/security/zap-baseline-backend.json

  trivy-backend:
    name: Trivy (Backend Image)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t predictax-backend ./backend

      - name: Run Trivy table report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: predictax-backend
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Run Trivy JSON report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: predictax-backend
          format: json
          output: trivy-backend.json
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy backend report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-backend-report
          path: trivy-backend.json

  trivy-frontend:
    name: Trivy (Frontend Image)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t predictax-frontend --target dev ./frontend

      - name: Run Trivy table report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: predictax-frontend
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Run Trivy JSON report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: predictax-frontend
          format: json
          output: trivy-frontend.json
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy frontend report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-frontend-report
          path: trivy-frontend.json
