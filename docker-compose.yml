name: predictax

services:
  frontend:
    container_name: predictax-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    restart: unless-stopped
