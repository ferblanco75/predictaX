name: predictax

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: predictax-postgres
    environment:
      POSTGRES_USER: predictax
      POSTGRES_PASSWORD: predictax_dev
      POSTGRES_DB: predictax
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: predictax-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: predictax-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to use Docker internal hostname
      - DATABASE_URL=postgresql://predictax:predictax_dev@postgres:5432/predictax
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Frontend
  frontend:
    container_name: predictax-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    env_file:
      - ./frontend/.env.local.example
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      # Override API URL to use Docker internal hostname for server-side requests
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - INTERNAL_API_URL=http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
